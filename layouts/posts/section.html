{{ define "main" }}
<div class="container tagcloud" style="padding: 0 16px;">
<div class="md:basis-[200px] lg:basis-[300px] py-4 prose dark:prose-invert">
  <h1 class="text-2xl">📁 {{ .Title }}</h1>
  <p class="text-gray-600 dark:text-gray-400">
    {{ len .Pages }} {{ if eq (len .Pages) 1 }}пост{{ else if gt (len .Pages) 1 }}{{ if gt (len .Pages) 4 }}постов{{ else }}поста{{ end }}{{ end }} в этой категории
  </p>
</div>

<div class="dream-grid opacity-0">
  {{ range .Pages }}
    <div class="w-full md:w-1/2 lg:w-1/3 xl:w-1/4 p-4 dream-column">
      {{ .Render "summary" }}
    </div>
  {{ end }}
</div>
{{ end }}
