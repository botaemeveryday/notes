{{- $title  := .Get "title"  | default "bash" -}}
{{- $prompt := .Get "prompt" | default "" -}}

<div class="terminal-wrap my-8 rounded-xl overflow-hidden shadow-xl font-mono text-sm">
  <div class="terminal-header flex items-center px-4 py-3 border-b">
    <div class="flex gap-1.5 shrink-0">
      <div class="w-3 h-3 rounded-full" style="background:#ff5f57"></div>
      <div class="w-3 h-3 rounded-full" style="background:#ffbd2e"></div>
      <div class="w-3 h-3 rounded-full" style="background:#28c840"></div>
    </div>
    <div class="mx-auto text-xs font-bold terminal-title px-4 truncate">{{ $title }}</div>
    <div class="w-16 shrink-0"></div>
  </div>

  <div class="terminal-body p-5 overflow-x-auto">
    {{- if $prompt -}}
    <div class="terminal-prompt mb-2 flex items-center gap-2">
      <span class="terminal-prompt-char font-bold">{{ $prompt }}</span>
      <span class="terminal-prompt-cursor">▋</span>
    </div>
    {{- end -}}
    <pre class="terminal-pre m-0 p-0 whitespace-pre-wrap break-words leading-relaxed bg-transparent border-none shadow-none">{{ .Inner }}</pre>
  </div>
</div>

<style>
/* ── Светлая тема ─────────────────────────────────── */
.terminal-wrap {
  background: #f5f5f7;
  color: #1d1d1f;
  border: 1px solid #d2d2d7;
}
.terminal-header {
  background: #e8e8ed;
  border-color: #d2d2d7;
}
.terminal-title { color: #6e6e73; }
.terminal-pre   { color: #1d1d1f; background: transparent; }
.terminal-prompt-char   { color: #007aff; }
.terminal-prompt-cursor { color: #007aff; animation: terminal-blink 1s step-end infinite; }

/* ── Тёмная тема (DaisyUI v5 без явных тем = prefers-color-scheme) ── */
@media (prefers-color-scheme: dark) {
  .terminal-wrap {
    background: #1a1b26;
    color: #a9b1d6;
    border-color: #3b3f5c;
  }
  .terminal-header {
    background: #16161e;
    border-color: #3b3f5c;
  }
  .terminal-title { color: #565f89; }
  .terminal-pre   { color: #a9b1d6; background: transparent; }
  .terminal-prompt-char   { color: #7aa2f7; }
  .terminal-prompt-cursor { color: #7aa2f7; }
}

@keyframes terminal-blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}
</style>
