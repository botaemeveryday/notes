{{ $parts := split .Inner "|||" }}
{{ $pros := index $parts 0 | default "" }}
{{ $cons := index $parts 1 | default "" }}

<div class="grid grid-cols-1 md:grid-cols-2 gap-4 my-6 not-prose">
  <div class="bg-success/10 border border-success/30 rounded-xl p-5">
    <h4 class="flex items-center gap-2 text-success font-bold mt-0 mb-3 text-sm uppercase tracking-wider">
      <ion-icon name="checkmark-circle"></ion-icon> Плюсы
    </h4>
    <div class="prose prose-sm dark:prose-invert max-w-none [&_ul]:mt-0 [&_li]:my-1">
      {{ $pros | markdownify }}
    </div>
  </div>
  <div class="bg-error/10 border border-error/30 rounded-xl p-5">
    <h4 class="flex items-center gap-2 text-error font-bold mt-0 mb-3 text-sm uppercase tracking-wider">
      <ion-icon name="close-circle"></ion-icon> Минусы
    </h4>
    <div class="prose prose-sm dark:prose-invert max-w-none [&_ul]:mt-0 [&_li]:my-1">
      {{ $cons | markdownify }}
    </div>
  </div>
</div>
