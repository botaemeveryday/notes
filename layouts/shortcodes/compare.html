<div class="grid grid-cols-1 md:grid-cols-2 gap-4 my-6">
  <div class="bg-success/10 border border-success/20 rounded-xl p-5">
    <h4 class="flex items-center gap-2 text-success font-bold mt-0 mb-4">
      <ion-icon name="checkmark-circle"></ion-icon> Плюсы
    </h4>
    <div class="prose-sm text-base-content/80">
      {{ .Get "pros" | markdownify }}
    </div>
  </div>
  <div class="bg-error/10 border border-error/20 rounded-xl p-5">
    <h4 class="flex items-center gap-2 text-error font-bold mt-0 mb-4">
      <ion-icon name="close-circle"></ion-icon> Минусы
    </h4>
    <div class="prose-sm text-base-content/80">
      {{ .Get "cons" | markdownify }}
    </div>
  </div>
</div>
