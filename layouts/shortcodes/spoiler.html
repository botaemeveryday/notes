<details class="group bg-base-200/50 border border-base-300 rounded-xl my-6 open:bg-base-200 transition-colors">
  <summary class="flex items-center gap-3 px-5 py-4 cursor-pointer font-medium text-base-content select-none">
    <ion-icon name="chevron-forward" class="transition-transform group-open:rotate-90"></ion-icon>
    {{ .Get "title" | default "Показать ответ" }}
  </summary>
  <div class="px-5 pb-4 pt-1 text-base-content/80 text-sm border-t border-base-300/50 mt-2">
    {{ .Inner | markdownify }}
  </div>
</details>
