<div class="mb-10 md:mb-14 mt-4">
  <div class="max-w-3xl mx-auto px-4">
    
    <div class="relative group">
      
      <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-base-content/40 group-focus-within:text-primary transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 md:h-6 md:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>

      <input 
        type="text" 
        id="global-search" 
        placeholder="Поиск по конспектам и предметам..." 
        class="w-full py-4 md:py-5 pl-14 pr-24 text-base md:text-lg transition-all duration-300 
               text-base-content bg-base-200/50 hover:bg-base-200 border border-transparent rounded-2xl
               focus:bg-base-200 focus:ring-primary/10 focus:outline-none placeholder:text-base-content/40"
        autocomplete="off"
      >

      <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none hidden sm:flex">
        <div class="flex items-center gap-1 opacity-50 group-focus-within:opacity-0 transition-opacity duration-200">
          <kbd class="px-2 py-1 text-xs font-sans font-semibold text-base-content bg-base-100 border border-base-300 rounded shadow-sm">⌘</kbd>
          <kbd class="px-2 py-1 text-xs font-sans font-semibold text-base-content bg-base-100 border border-base-300 rounded shadow-sm">K</kbd>
        </div>
      </div>

    </div>

    <div id="search-results" class="mt-3 text-sm font-medium text-base-content/50 pl-2 hidden transition-all">
      Найдено результатов: <span id="result-count" class="text-primary font-bold">0</span>
    </div>

  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
    if (!isMac) {
      const kbd = document.querySelector('kbd:first-of-type');
      if (kbd) kbd.innerText = 'Ctrl';
    }
  });
</script>
