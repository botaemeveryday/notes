{{ if .IsPage }}

<div id="ai-lecture-text" class="hidden" aria-hidden="true">{{ .Plain }}</div>
<div id="ai-lecture-title" class="hidden" aria-hidden="true">{{ .Title }}</div>

<style>
  #ai-widget-root {
    position: fixed;
    bottom: 1.75rem;
    right: 1.75rem;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0;
  }

  @media (max-width: 640px) {
    #ai-widget-root {
      bottom: 1.25rem;
      right: 1.25rem;
    }
  }

  #ai-widget-menu {
    background-color: white !important;
    margin-bottom: 0.75rem;
    width: 15rem;
    border-radius: 1.25rem;
    padding: 0.5rem;
    background: oklch(var(--b1));
    border: 1px solid oklch(var(--b3));
    box-shadow: 0 20px 60px -10px rgb(0 0 0 / 0.25), 0 4px 20px rgb(0 0 0 / 0.08);
    transform-origin: bottom right;

    opacity: 0;
    transform: scale(0.85) translateY(12px);
    pointer-events: none;
    transition:
      opacity 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
      transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  #ai-widget-menu.is-open {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: auto;
  }

  .ai-menu-label {
    font-size: 0.625rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: oklch(var(--bc) / 0.4);
    padding: 0.5rem 0.75rem 0.25rem;
  }

  .ai-menu-btn {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    width: 100%;
    padding: 0.625rem 0.75rem;
    border-radius: 0.875rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: oklch(var(--bc));
    background: transparent;
    border: none;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s ease, transform 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .ai-menu-btn:hover {
    background: oklch(var(--b2));
    transform: translateX(2px);
  }

  .ai-menu-btn:active {
    transform: translateX(2px) scale(0.98);
  }

  .ai-menu-btn.copying::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, oklch(var(--p) / 0.15) 50%, transparent 100%);
    animation: ai-shimmer 0.8s ease-in-out;
  }

  @keyframes ai-shimmer {
    from { transform: translateX(-100%); }
    to   { transform: translateX(100%); }
  }

  .ai-menu-btn .ai-brand-icon {
    width: 1.5rem;
    height: 1.5rem;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ai-menu-btn .ai-status {
    font-size: 0.75rem;
    color: oklch(var(--su));
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.35rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ai-menu-divider {
    height: 1px;
    background: oklch(var(--b3));
    margin: 0.35rem 0.5rem;
  }

  #ai-widget-btn {
    width: 3.25rem;
    height: 3.25rem;
    border-radius: 50%;
    border: 1px solid oklch(var(--b3));
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: oklch(var(--b1));
    color: oklch(var(--bc));
    box-shadow:
      0 2px 8px rgb(0 0 0 / 0.08),
      0 1px 2px rgb(0 0 0 / 0.04);
    transition:
      transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
      box-shadow 0.25s ease,
      border-color 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  #ai-widget-btn:hover {
    transform: translateY(-2px) scale(1.04);
    box-shadow:
      0 6px 20px rgb(0 0 0 / 0.12),
      0 2px 6px rgb(0 0 0 / 0.06);
    border-color: oklch(var(--b2));
  }

  #ai-widget-btn:active {
    transform: translateY(0) scale(0.97);
    box-shadow: 0 1px 4px rgb(0 0 0 / 0.08);
  }

  .ai-btn-icon {
    font-size: 1.35rem;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s ease;
    display: flex;
    color: oklch(var(--bc));
  }

  #ai-widget-btn:not(.is-open)::after {
    content: '';
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1px solid oklch(var(--bc) / 0.2);
    animation: ai-pulse-ring 3s ease-out infinite;
  }

  @keyframes ai-pulse-ring {
    0%   { transform: scale(1);    opacity: 0.6; }
    70%  { transform: scale(1.4);  opacity: 0;   }
    100% { transform: scale(1.4);  opacity: 0;   }
  }
</style>

<script>
(function () {
  'use strict';

  const root    = document.getElementById('ai-widget-root');
  const menu    = document.getElementById('ai-widget-menu');
  const mainBtn = document.getElementById('ai-widget-btn');

  if (!root || !menu || !mainBtn) return;

  let isOpen = false;

  function open() {
    isOpen = true;
    menu.classList.add('is-open');
    mainBtn.classList.add('is-open');
    mainBtn.setAttribute('aria-expanded', 'true');
    menu.setAttribute('aria-hidden', 'false');
  }

  function close() {
    isOpen = false;
    menu.classList.remove('is-open');
    mainBtn.classList.remove('is-open');
    mainBtn.setAttribute('aria-expanded', 'false');
    menu.setAttribute('aria-hidden', 'true');
  }

  function toggle() {
    isOpen ? close() : open();
  }

  mainBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    toggle();
  });

  document.addEventListener('click', function (e) {
    if (isOpen && !root.contains(e.target)) close();
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && isOpen) close();
  });

  function buildPrompt() {
    const title   = (document.getElementById('ai-lecture-title')?.innerText || document.title).trim();
    const rawText = (document.getElementById('ai-lecture-text')?.innerText || '').trim();
    const excerpt = rawText.length > 11000 ? rawText.substring(0, 11000) + '\n\n[...конспект сокращён...]' : rawText;

    return `Ты — опытный преподаватель и ментор. Студент прислал тебе конспект своей лекции и хочет разобраться в материале глубже.

Тема лекции: «${title}»

Конспект:
---
${excerpt}
---

Твоя задача:
• Отвечай строго по материалу конспекта — не выходи за его рамки без явной просьбы
• Объясняй просто, с аналогиями и примерами
• Если что-то в конспекте неточно или неполно — мягко это отметь
• Говори как живой человек, не как справочник

Студент напишет свой вопрос следующим сообщением. Просто поздоровайся одной строкой и скажи, что готов помочь разобраться с темой.`;
  }

  function handleAiClick(btn) {
    const url  = btn.dataset.url;
    const name = btn.dataset.name || 'ИИ';

    if (!url) return;

    const prompt = buildPrompt();

    const labelEl = btn.querySelector('.ai-btn-label');
    const originalHTML = btn.innerHTML;

    btn.classList.add('copying');
    btn.disabled = true;

    navigator.clipboard.writeText(prompt).then(function () {
      btn.innerHTML = `
        <span class="ai-brand-icon">
          <ion-icon name="checkmark-circle" style="color:oklch(var(--su));font-size:1.25rem"></ion-icon>
        </span>
        <span class="ai-status">
          <span>Скопировано!</span>
        </span>`;

      setTimeout(function () {
        window.open(url, '_blank', 'noopener,noreferrer');
        btn.innerHTML = originalHTML;
        btn.disabled  = false;
        btn.classList.remove('copying');
        close();
      }, 900);

    }).catch(function (err) {
      console.warn('[ai-widget] clipboard error:', err);

      try {
        const ta = document.createElement('textarea');
        ta.value = prompt;
        ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);

        btn.innerHTML = `
          <span class="ai-brand-icon">
            <ion-icon name="checkmark-circle" style="color:oklch(var(--su));font-size:1.25rem"></ion-icon>
          </span>
          <span class="ai-status">Скопировано!</span>`;

        setTimeout(function () {
          window.open(url, '_blank', 'noopener,noreferrer');
          btn.innerHTML = originalHTML;
          btn.disabled  = false;
          btn.classList.remove('copying');
          close();
        }, 900);

      } catch (e2) {
        btn.innerHTML = originalHTML;
        btn.disabled  = false;
        btn.classList.remove('copying');
        alert('Не удалось скопировать. Попробуйте в другом браузере.');
      }
    });
  }

  menu.querySelectorAll('.ai-menu-btn[data-url]').forEach(function (btn) {
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      handleAiClick(btn);
    });
  });

})();
</script>
