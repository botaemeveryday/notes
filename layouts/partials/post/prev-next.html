<div class="divider my-12"></div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
  {{ with .PrevInSection }}
  <a class="flex items-center gap-4 p-4 rounded-2xl border border-base-300 hover:border-primary hover:bg-primary/5 transition-all group" href="{{ .RelPermalink }}">
    <div class="w-10 h-10 rounded-full bg-base-200 flex items-center justify-center group-hover:bg-primary group-hover:text-primary-content transition-colors shrink-0">
      <ion-icon name="chevron-back"></ion-icon>
    </div>
    <div class="flex flex-col flex-1 overflow-hidden">
      <span class="text-xs text-base-content/50 uppercase tracking-wider">Предыдущая</span>
      <span class="font-medium truncate">{{ .Title }}</span>
    </div>
  </a>
  {{ else }}<div></div>{{ end }}

  {{ with .NextInSection }}
  <a class="flex items-center justify-end text-right gap-4 p-4 rounded-2xl border border-base-300 hover:border-primary hover:bg-primary/5 transition-all group" href="{{ .RelPermalink }}">
    <div class="flex flex-col flex-1 overflow-hidden">
      <span class="text-xs text-base-content/50 uppercase tracking-wider">Следующая</span>
      <span class="font-medium truncate">{{ .Title }}</span>
    </div>
    <div class="w-10 h-10 rounded-full bg-base-200 flex items-center justify-center group-hover:bg-primary group-hover:text-primary-content transition-colors shrink-0">
      <ion-icon name="chevron-forward"></ion-icon>
    </div>
  </a>
  {{ else }}<div></div>{{ end }}
</div>
